name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - "functions/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - "functions/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler@4 pages deploy ./packages/frontend/out --project-name "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}" --functions ./functions
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
