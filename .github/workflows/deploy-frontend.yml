name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_STATIONS_API_URL: ${{ secrets.NEXT_PUBLIC_STATIONS_API_URL }}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./packages/frontend/out

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
