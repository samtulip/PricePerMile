name: Deploy Stations API Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/**"
      - ".github/workflows/deploy-stations-api.yml"

permissions:
  contents: read

jobs:
  deploy-stations-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy Cloudflare Worker for station data
        run: |
          cat <<EOF > /tmp/wrangler-stations-api.toml
          name = "${{ secrets.CLOUDFLARE_STATIONS_WORKER_NAME }}"
          main = "workers/stations-api/src/index.ts"
          compatibility_date = "2026-07-20"
          [vars]
          STATIONS_KV_KEY = "stations.json"
          [[kv_namespaces]]
          binding = "STATIONS_KV"
          id = "${{ secrets.CLOUDFLARE_STATIONS_KV_NAMESPACE_ID }}"
          EOF

          npx wrangler@4 deploy --config /tmp/wrangler-stations-api.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
